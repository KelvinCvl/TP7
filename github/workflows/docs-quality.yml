name: DCT Quality Checks
on:
  pull_request:
    paths:
      - '**/*.md'

jobs:
  markdown-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install tools
        run: npm install -g markdownlint-cli markdown-link-check
      - name: Lint Markdown
        run: markdownlint **/*.md --ignore node_modules
      - name: Check links
        run: find . -name "*.md" -not-path "./node_modules/*" -exec markdown-link-check {} \;
